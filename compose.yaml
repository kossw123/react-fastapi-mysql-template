
services:
  client:
    container_name: vite-client
    build: 
      context: ./client
    ports:
      - 3000:3000
    volumes:
      - ./client:/app
      - /app/node_modules
  server:
    container_name: fastapi-server
    build:
      context: ./server
      dockerfile: infra/Dockerfile
    ports:
      - 8000:8000
    env_file:
      - ./server/infra/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    develop:
      watch:
        - action: rebuild
          path: .
    volumes:
      - ./server:/app

  redis:
    image: redis:latest
    container_name: redis-server
    ports:
      - "6379:6379"


  db:
    container_name: mysql-server
    image: mysql:8.0
    restart: always
    env_file:
      - ./server/infra/.env
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  db-data:
  redis-data: